<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CDCS Automated Test Runner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap');

        :root {
            --bg: #0a0c10;
            --surface: #13161c;
            --surface-2: #1a1e26;
            --border: #262c36;
            --text: #d4dae4;
            --text-dim: #6b7588;
            --blue: #4da0ff;
            --blue-bg: rgba(77,160,255,0.08);
            --green: #34d399;
            --green-bg: rgba(52,211,153,0.08);
            --red: #f87171;
            --red-bg: rgba(248,113,113,0.08);
            --amber: #fbbf24;
            --amber-bg: rgba(251,191,36,0.08);
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Outfit', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 32px 24px;
            max-width: 960px;
            margin: 0 auto;
        }

        .title-bar {
            display: flex;
            align-items: baseline;
            gap: 12px;
            margin-bottom: 8px;
        }

        .title-bar h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .title-bar .version {
            font-family: var(--mono);
            font-size: 11px;
            color: var(--text-dim);
            background: var(--surface-2);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 13px;
            margin-bottom: 28px;
        }

        /* ── Input area ── */
        .input-area {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 24px;
        }

        .input-area label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-bottom: 8px;
        }

        .input-area textarea {
            width: 100%;
            min-height: 80px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 12px;
            resize: vertical;
            outline: none;
            line-height: 1.6;
        }

        .input-area textarea:focus {
            border-color: var(--blue);
        }

        .input-area textarea::placeholder {
            color: #3a4050;
        }

        .input-area .hint {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .run-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 14px;
        }

        .btn-run {
            padding: 10px 24px;
            background: var(--blue);
            color: var(--bg);
            border: none;
            border-radius: 6px;
            font-family: var(--sans);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .btn-run:hover { opacity: 0.85; }
        .btn-run:disabled { opacity: 0.3; cursor: not-allowed; }

        .global-status {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--text-dim);
        }

        /* ── Test results ── */
        .results-area {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .test-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.3s;
        }

        .test-card.running { border-color: var(--blue); }
        .test-card.pass { border-color: var(--green); }
        .test-card.fail { border-color: var(--red); }
        .test-card.warn { border-color: var(--amber); }

        .test-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
        }

        .test-card-header .sid {
            font-family: var(--mono);
            font-size: 13px;
            font-weight: 600;
        }

        .test-card-header .verdict {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 3px 10px;
            border-radius: 4px;
        }

        .verdict.running { color: var(--blue); background: var(--blue-bg); }
        .verdict.pass { color: var(--green); background: var(--green-bg); }
        .verdict.fail { color: var(--red); background: var(--red-bg); }
        .verdict.warn { color: var(--amber); background: var(--amber-bg); }
        .verdict.queued { color: var(--text-dim); background: var(--surface-2); }

        .test-steps {
            padding: 0;
            list-style: none;
        }

        .test-step {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 18px;
            font-size: 12px;
            font-family: var(--mono);
            line-height: 1.5;
            border-bottom: 1px solid rgba(38,44,54,0.5);
            min-height: 32px;
        }

        .test-step:last-child { border-bottom: none; }

        .step-icon {
            flex-shrink: 0;
            width: 16px;
            height: 16px;
            margin-top: 1px;
            text-align: center;
            font-size: 12px;
            line-height: 16px;
        }

        .step-icon.pending { color: var(--text-dim); }
        .step-icon.running { color: var(--blue); }
        .step-icon.ok { color: var(--green); }
        .step-icon.fail { color: var(--red); }
        .step-icon.warn { color: var(--amber); }

        .step-text { flex: 1; }
        .step-text .detail {
            color: var(--text-dim);
            font-size: 11px;
            display: block;
            margin-top: 2px;
            word-break: break-all;
        }

        .step-text .error-detail {
            color: var(--red);
            font-size: 11px;
            display: block;
            margin-top: 2px;
            word-break: break-all;
        }

        /* Network log */
        .network-section {
            padding: 12px 18px;
            border-top: 1px solid var(--border);
        }

        .network-section summary {
            font-size: 11px;
            color: var(--text-dim);
            cursor: pointer;
            font-family: var(--mono);
        }

        .network-log {
            margin-top: 8px;
            font-family: var(--mono);
            font-size: 11px;
            line-height: 1.6;
            color: var(--text-dim);
            max-height: 200px;
            overflow-y: auto;
        }

        .network-log .req {
            padding: 3px 0;
            border-bottom: 1px solid rgba(38,44,54,0.3);
        }

        .network-log .req.error { color: var(--red); }
        .network-log .req.ok { color: var(--text-dim); }

        /* Spinner */
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid var(--blue);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        /* Summary */
        .summary-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            margin-top: 8px;
        }

        .summary-card h2 {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .summary-card pre {
            font-family: var(--mono);
            font-size: 12px;
            line-height: 1.7;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>

<div class="title-bar">
    <h1>CDCS Automated Test</h1>
    <span class="version">Browser SDK v2.12.1</span>
</div>
<p class="subtitle">Enter Settings IDs below and click Run. Each ID gets a fully automated test: init → accept all → clear storage → restore with controllerID → verify consents.</p>

<div class="input-area">
    <label>Settings IDs (one per line)</label>
    <textarea id="settingsInput" placeholder="tIkRJxexTam6P8
PIsxCtDSMLX4O1
m6JGswqWVee2Ho">tIkRJxexTam6P8
PIsxCtDSMLX4O1
m6JGswqWVee2Ho
noA23m0yw3N9mk
fzqn_OViVHqQHO</textarea>
    <div class="hint">One Settings ID per line. CCPA configs excluded. Empty lines are ignored.</div>
    <div class="run-row">
        <button class="btn-run" id="btnRun" onclick="runAllTests()">Run All Tests</button>
        <span class="global-status" id="globalStatus"></span>
    </div>
</div>

<div class="results-area" id="resultsArea"></div>
<div id="summaryArea"></div>

<script>
    // ─── We load the SDK dynamically so we can detect load failures ───
    let sdkLoaded = false;
    let sdkLoadPromise = null;

    function loadSDK() {
        if (sdkLoadPromise) return sdkLoadPromise;
        sdkLoadPromise = new Promise((resolve, reject) => {
            if (typeof UC_SDK !== 'undefined') { sdkLoaded = true; resolve(); return; }
            const s = document.createElement('script');
            s.src = 'https://app.usercentrics.eu/browser-sdk/2.12.1/bundle.js';
            s.onload = () => { sdkLoaded = true; resolve(); };
            s.onerror = () => reject(new Error('Failed to load Browser SDK from app.usercentrics.eu'));
            document.head.appendChild(s);
        });
        return sdkLoadPromise;
    }

    // ─── Utility: clear ALL UC-related localStorage ───
    function clearUCStorage() {
        const toRemove = [];
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && (key.startsWith('uc_') || key.startsWith('UC_') || key.includes('usercentrics') || key.includes('Usercentrics'))) {
                toRemove.push(key);
            }
        }
        toRemove.forEach(k => localStorage.removeItem(k));
        return toRemove.length;
    }

    // ─── Intercept network requests for consentState ───
    function createNetworkInterceptor() {
        const log = [];
        const origFetch = window.fetch;

        const interceptedFetch = function(...args) {
            const url = typeof args[0] === 'string' ? args[0] : args[0]?.url || '';
            const isRelevant = url.includes('consentState') || url.includes('consentsHistory') || url.includes('consentStatus');

            if (isRelevant) {
                const entry = { url: url.split('?')[0], params: url.split('?')[1] || '', status: null, ok: null, error: null, timestamp: new Date().toLocaleTimeString('en-GB', { hour12: false }) };
                log.push(entry);
                return origFetch.apply(this, args).then(resp => {
                    entry.status = resp.status;
                    entry.ok = resp.ok;
                    return resp;
                }).catch(err => {
                    entry.error = err.message;
                    throw err;
                });
            }
            return origFetch.apply(this, args);
        };

        return {
            install() { window.fetch = interceptedFetch; },
            restore() { window.fetch = origFetch; },
            getLog() { return log; }
        };
    }

    // ─── DOM helpers ───
    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function createTestCard(settingsId, index) {
        const card = document.createElement('div');
        card.className = 'test-card';
        card.id = `card-${index}`;
        card.innerHTML = `
            <div class="test-card-header">
                <span class="sid">${esc(settingsId)}</span>
                <span class="verdict queued" id="verdict-${index}">QUEUED</span>
            </div>
            <ul class="test-steps" id="steps-${index}">
                <li class="test-step" id="step-${index}-0"><span class="step-icon pending">○</span><span class="step-text">Clear localStorage</span></li>
                <li class="test-step" id="step-${index}-1"><span class="step-icon pending">○</span><span class="step-text">Init SDK (new session)</span></li>
                <li class="test-step" id="step-${index}-2"><span class="step-icon pending">○</span><span class="step-text">Accept All services</span></li>
                <li class="test-step" id="step-${index}-3"><span class="step-icon pending">○</span><span class="step-text">Read controllerID + consents (Device A)</span></li>
                <li class="test-step" id="step-${index}-4"><span class="step-icon pending">○</span><span class="step-text">Clear localStorage + reset SDK</span></li>
                <li class="test-step" id="step-${index}-5"><span class="step-icon pending">○</span><span class="step-text">Init SDK with controllerID (Device B restore)</span></li>
                <li class="test-step" id="step-${index}-6"><span class="step-icon pending">○</span><span class="step-text">Verify restored consents match Device A</span></li>
                <li class="test-step" id="step-${index}-7"><span class="step-icon pending">○</span><span class="step-text">Check shouldCollectConsent == false</span></li>
            </ul>
            <div class="network-section">
                <details>
                    <summary>Network log (consentState requests)</summary>
                    <div class="network-log" id="netlog-${index}">—</div>
                </details>
            </div>
        `;
        return card;
    }

    function setStep(index, step, icon, text, detail, detailClass) {
        const el = document.getElementById(`step-${index}-${step}`);
        if (!el) return;
        const iconMap = { pending: '○', running: '◉', ok: '✓', fail: '✗', warn: '⚠' };
        el.querySelector('.step-icon').className = `step-icon ${icon}`;
        el.querySelector('.step-icon').textContent = iconMap[icon] || '○';
        if (text) {
            let html = esc(text);
            if (detail) {
                html += `<span class="${detailClass === 'error' ? 'error-detail' : 'detail'}">${esc(detail)}</span>`;
            }
            el.querySelector('.step-text').innerHTML = html;
        }
    }

    function setVerdict(index, verdict) {
        const el = document.getElementById(`verdict-${index}`);
        const card = document.getElementById(`card-${index}`);
        if (el) { el.className = `verdict ${verdict}`; el.textContent = verdict.toUpperCase(); }
        if (card) { card.className = `test-card ${verdict}`; }
    }

    function renderNetLog(index, entries) {
        const el = document.getElementById(`netlog-${index}`);
        if (!el) return;
        if (entries.length === 0) { el.textContent = 'No consentState/consentsHistory requests captured.'; return; }
        el.innerHTML = entries.map(e => {
            const cls = e.ok === false || e.error ? 'error' : 'ok';
            const status = e.error ? `ERR: ${e.error}` : `${e.status}`;
            return `<div class="req ${cls}">${e.timestamp} ${status} ${e.url}?${e.params}</div>`;
        }).join('');
    }

    // ─── Single test runner ───
    async function runSingleTest(settingsId, index) {
        const results = {
            settingsId,
            controllerIdA: null,
            consentsA: null,
            controllerIdB: null,
            consentsB: null,
            shouldCollectB: null,
            initialLayerB: null,
            errors: [],
            verdict: 'unknown'
        };

        const net = createNetworkInterceptor();
        net.install();

        try {
            setVerdict(index, 'running');

            // ── Step 0: Clear storage ──
            setStep(index, 0, 'running', 'Clearing localStorage...');
            const removed = clearUCStorage();
            localStorage.clear(); // nuclear option for clean test
            setStep(index, 0, 'ok', 'Clear localStorage', `Removed ${removed} UC keys + full clear`);

            // ── Step 1: Init SDK new session ──
            setStep(index, 1, 'running', 'Initializing SDK (new session)...');
            let ucA;
            try {
                ucA = new UC_SDK.default(settingsId);
                var initA = await withTimeout(ucA.init(), 20000, 'init() timeout after 20s');
                setStep(index, 1, 'ok', 'Init SDK (new session)', `initialLayer: ${initA.initialLayer}, variant: ${initA.variant}`);
            } catch (err) {
                setStep(index, 1, 'fail', 'Init SDK (new session)', err.message, 'error');
                results.errors.push(`Step 1 init failed: ${err.message}`);
                throw err;
            }

            // ── Step 2: Accept All ──
            setStep(index, 2, 'running', 'Accepting all services...');
            try {
                ucA.acceptAllServices();
                setStep(index, 2, 'ok', 'Accept All services');
            } catch (err) {
                setStep(index, 2, 'fail', 'Accept All services', err.message, 'error');
                results.errors.push(`Step 2 acceptAll failed: ${err.message}`);
                throw err;
            }

            // ── Step 3: Read Device A state ──
            setStep(index, 3, 'running', 'Reading controllerID + consents...');
            try {
                const settingsA = ucA.getSettings();
                results.controllerIdA = settingsA?.controllerId || null;
                const servicesA = ucA.getServicesBaseInfo();
                results.consentsA = servicesA.map(s => ({ name: s.name, id: s.id, consent: s.consent, isEssential: s.isEssential }));
                const allTrue = results.consentsA.every(s => s.consent === true);
                setStep(index, 3, allTrue ? 'ok' : 'warn',
                    'Read controllerID + consents (Device A)',
                    `controllerID: ${results.controllerIdA}\nServices: ${results.consentsA.map(s => `${s.name}=${s.consent}`).join(', ')}`
                );
                if (!results.controllerIdA) {
                    results.errors.push('No controllerID returned after acceptAll');
                    throw new Error('No controllerID');
                }
            } catch (err) {
                if (!results.controllerIdA) {
                    setStep(index, 3, 'fail', 'Read controllerID + consents (Device A)', err.message, 'error');
                    results.errors.push(`Step 3 read state failed: ${err.message}`);
                    throw err;
                }
            }

            // ── Step 4: Clear storage + destroy SDK instance ──
            setStep(index, 4, 'running', 'Clearing localStorage + resetting SDK...');
            ucA = null;
            localStorage.clear();
            clearUCStorage();
            // Small pause to ensure cleanup
            await sleep(500);
            setStep(index, 4, 'ok', 'Clear localStorage + reset SDK', 'Full localStorage cleared to simulate different device');

            // ── Step 5: Init with controllerID (Device B) ──
            setStep(index, 5, 'running', `Initializing SDK with controllerID: ${results.controllerIdA.substring(0, 16)}...`);
            let ucB;
            try {
                ucB = new UC_SDK.default(settingsId, { controllerId: results.controllerIdA });
                var initB = await withTimeout(ucB.init(), 20000, 'init() with controllerID timeout after 20s');
                results.initialLayerB = initB.initialLayer;
                setStep(index, 5, 'ok', 'Init SDK with controllerID (Device B restore)',
                    `initialLayer: ${initB.initialLayer}, variant: ${initB.variant}`);
            } catch (err) {
                setStep(index, 5, 'fail', 'Init SDK with controllerID (Device B restore)', err.message, 'error');
                results.errors.push(`Step 5 restore init failed: ${err.message}`);
                throw err;
            }

            // ── Step 6: Verify consents restored ──
            setStep(index, 6, 'running', 'Verifying consents match Device A...');
            try {
                const settingsB = ucB.getSettings();
                results.controllerIdB = settingsB?.controllerId || null;
                const servicesB = ucB.getServicesBaseInfo();
                results.consentsB = servicesB.map(s => ({ name: s.name, id: s.id, consent: s.consent, isEssential: s.isEssential }));

                // Compare
                let mismatches = [];
                for (const sA of results.consentsA) {
                    const sB = results.consentsB.find(b => b.id === sA.id);
                    if (!sB) {
                        mismatches.push(`${sA.name}: missing on Device B`);
                    } else if (sA.consent !== sB.consent) {
                        mismatches.push(`${sA.name}: Device A=${sA.consent}, Device B=${sB.consent}`);
                    }
                }

                if (mismatches.length === 0) {
                    setStep(index, 6, 'ok', 'Verify restored consents match Device A',
                        `All ${results.consentsB.length} services match. controllerID B: ${results.controllerIdB}`);
                } else {
                    setStep(index, 6, 'fail', 'Verify restored consents match Device A',
                        `MISMATCHES:\n${mismatches.join('\n')}`, 'error');
                    results.errors.push(`Consent mismatch: ${mismatches.join('; ')}`);
                }
            } catch (err) {
                setStep(index, 6, 'fail', 'Verify restored consents match Device A', err.message, 'error');
                results.errors.push(`Step 6 verify failed: ${err.message}`);
            }

            // ── Step 7: Check shouldCollectConsent ──
            const shouldCollect = results.initialLayerB !== undefined && results.initialLayerB !== 2; // 2 = NONE
            results.shouldCollectB = shouldCollect;

            if (!shouldCollect) {
                setStep(index, 7, 'ok', 'shouldCollectConsent == false',
                    `initialLayer: ${results.initialLayerB} (NONE) — banner will NOT show. CDCS working correctly.`);
            } else {
                const layerNames = { 0: 'FIRST_LAYER', 1: 'SECOND_LAYER', 2: 'NONE' };
                const layerName = layerNames[results.initialLayerB] || results.initialLayerB;
                setStep(index, 7, 'fail', 'shouldCollectConsent should be false but is TRUE',
                    `initialLayer: ${results.initialLayerB} (${layerName}) — banner WILL show again. CDCS NOT restoring consent properly.`, 'error');
                results.errors.push(`shouldCollectConsent=true after restore (initialLayer=${results.initialLayerB}/${layerName})`);
            }

            // ── Cleanup SDK ──
            ucB = null;

        } catch (err) {
            // Already logged per step
        }

        net.restore();
        renderNetLog(index, net.getLog());

        // Check for 404s on consentState
        const failed404 = net.getLog().filter(e => e.status === 404 && e.url.includes('consentState'));
        if (failed404.length > 0) {
            results.errors.push(`consentState returned 404 — CDCS endpoint not available for this settingsId`);
        }

        // Final verdict
        if (results.errors.length === 0) {
            results.verdict = 'pass';
        } else if (results.errors.some(e => e.includes('404') || e.includes('shouldCollectConsent') || e.includes('mismatch'))) {
            results.verdict = 'fail';
        } else {
            results.verdict = 'warn';
        }

        setVerdict(index, results.verdict);
        return results;
    }

    // ─── Run all tests sequentially ───
    async function runAllTests() {
        const btn = document.getElementById('btnRun');
        const statusEl = document.getElementById('globalStatus');
        btn.disabled = true;

        const lines = document.getElementById('settingsInput').value.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        if (lines.length === 0) {
            statusEl.textContent = 'No Settings IDs entered.';
            btn.disabled = false;
            return;
        }

        // Load SDK first
        statusEl.textContent = 'Loading Browser SDK...';
        try {
            await loadSDK();
        } catch (err) {
            statusEl.textContent = 'FATAL: Could not load SDK. Open this file in Chrome/Firefox directly (not in an embedded preview). Disable adblockers for app.usercentrics.eu.';
            btn.disabled = false;
            return;
        }

        // Create cards
        const resultsArea = document.getElementById('resultsArea');
        resultsArea.innerHTML = '';
        for (let i = 0; i < lines.length; i++) {
            resultsArea.appendChild(createTestCard(lines[i], i));
        }

        // Run sequentially
        const allResults = [];
        for (let i = 0; i < lines.length; i++) {
            statusEl.textContent = `Testing ${i + 1}/${lines.length}: ${lines[i]}`;
            const r = await runSingleTest(lines[i], i);
            allResults.push(r);
            // Pause between tests
            if (i < lines.length - 1) await sleep(1000);
        }

        // Summary
        const passed = allResults.filter(r => r.verdict === 'pass').length;
        const failed = allResults.filter(r => r.verdict === 'fail').length;
        const warns = allResults.filter(r => r.verdict === 'warn').length;
        statusEl.textContent = `Done: ${passed} passed, ${failed} failed, ${warns} warnings`;

        renderSummary(allResults);
        btn.disabled = false;
    }

    function renderSummary(results) {
        const area = document.getElementById('summaryArea');

        let report = `CDCS TEST REPORT — ${new Date().toISOString()}\n`;
        report += `${'═'.repeat(60)}\n\n`;

        for (const r of results) {
            const icon = r.verdict === 'pass' ? '✓' : r.verdict === 'fail' ? '✗' : '⚠';
            report += `${icon} ${r.settingsId}  →  ${r.verdict.toUpperCase()}\n`;
            if (r.controllerIdA) report += `  controllerID (A): ${r.controllerIdA}\n`;
            if (r.controllerIdB) report += `  controllerID (B): ${r.controllerIdB}\n`;
            if (r.controllerIdA && r.controllerIdB) {
                report += `  controllerID match: ${r.controllerIdA === r.controllerIdB ? 'YES' : 'NO ← PROBLEM'}\n`;
            }
            report += `  initialLayer on restore: ${r.initialLayerB}\n`;
            report += `  shouldCollectConsent on restore: ${r.shouldCollectB}\n`;
            if (r.consentsA) {
                report += `  Device A consents: ${r.consentsA.map(s => `${s.name}=${s.consent}`).join(', ')}\n`;
            }
            if (r.consentsB) {
                report += `  Device B consents: ${r.consentsB.map(s => `${s.name}=${s.consent}`).join(', ')}\n`;
            }
            if (r.errors.length > 0) {
                report += `  ERRORS:\n`;
                r.errors.forEach(e => { report += `    → ${e}\n`; });
            }
            report += '\n';
        }

        report += `${'═'.repeat(60)}\n`;
        report += `SUMMARY: ${results.filter(r => r.verdict === 'pass').length} PASS / ${results.filter(r => r.verdict === 'fail').length} FAIL / ${results.filter(r => r.verdict === 'warn').length} WARN\n`;

        const failedIds = results.filter(r => r.verdict === 'fail').map(r => r.settingsId);
        if (failedIds.length > 0) {
            report += `\nFAILED IDs: ${failedIds.join(', ')}\n`;
            report += `\nLikely cause: consentState endpoint returns 404 for these settingsIds.\n`;
            report += `CDCS may not be fully activated at the backend/API level,\n`;
            report += `even if the toggle shows enabled in the Admin Interface / GraphQL.\n`;
        }

        area.innerHTML = `
            <div class="summary-card">
                <h2>Test Report (copy-pasteable)</h2>
                <pre>${esc(report)}</pre>
            </div>
        `;
    }

    // ─── Helpers ───
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function withTimeout(promise, ms, msg) {
        return Promise.race([
            promise,
            new Promise((_, reject) => setTimeout(() => reject(new Error(msg)), ms))
        ]);
    }
</script>

</body>
</html>
